# Render Blueprint — https://render.com/docs/blueprint-spec

services:
  # ── Backend (Express API + Frontend SPA) ────────────────────────────────
  - type: web
    name: taskora-backend
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install && cd ../frontend && npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: "30d"
      - key: FRONTEND_URL
        value: https://tejesh-taskora.onrender.com
      - key: VITE_API_URL
        value: https://tejesh-taskora.onrender.com
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: ADMIN_EMAIL
        value: admin@taskora.com
      - key: ADMIN_PASSWORD
        sync: false
